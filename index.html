<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kodomon</title>
<meta name="description" content="A desktop pet that grows when you code. macOS desktop pet powered by real coding.">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: #F5F0E1;
    color: #2A2A2A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  /* Red bar at top like the app */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: #D83632;
    z-index: 10;
  }

  .card {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .pretitle {
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #6B6560;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'DotGothic16', monospace;
    font-size: clamp(56px, 12vw, 80px);
    font-weight: 400;
    letter-spacing: 0.06em;
    line-height: 1;
    margin-bottom: 6px;
  }

  .jp {
    font-family: 'DotGothic16', sans-serif;
    font-size: clamp(20px, 5vw, 28px);
    color: #D83632;
    letter-spacing: 0.25em;
    margin-bottom: 40px;
  }

  /* Pixel egg */
  .egg {
    display: flex;
    justify-content: center;
    margin-bottom: 40px;
    animation: bob 2.5s ease-in-out infinite;
  }

  .egg-grid { image-rendering: pixelated; }
  .egg-grid .r { display: flex; justify-content: center; }
  .egg-grid .p { width: 8px; height: 8px; flex-shrink: 0; }
  .c0 { background: transparent; }
  .c1 { background: #8B6B4A; }
  .c2 { background: #D9A882; }
  .c3 { background: #C48A6A; }
  .c4 { background: #A06B4A; }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .tagline {
    font-size: 14px;
    color: #6B6560;
    line-height: 1.6;
    margin-bottom: 48px;
  }

  /* Install box */
  .install {
    background: #2A2A2A;
    color: #F5F0E1;
    border-radius: 10px;
    padding: 18px 22px;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 24px #2a2a2a15;
    margin-bottom: 8px;
    overflow-x: auto;
    white-space: nowrap;
  }

  .install:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px #2a2a2a22;
  }

  .install .pr { color: #D83632; user-select: none; }
  .install .url { color: #D85A30; }

  .hint {
    font-size: 11px;
    color: #D6D0C4;
    margin-bottom: 48px;
    transition: color 0.2s;
  }

  .hint.ok { color: #1D9E75; }

  /* Red accent line like the app widget */
  .line {
    width: 100%;
    height: 3px;
    background: #D83632;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .sub {
    font-size: 12px;
    color: #6B6560;
    margin-bottom: 6px;
  }

  .sub span { margin: 0 8px; opacity: 0.3; }

  .links a {
    font-size: 12px;
    color: #D83632;
    text-decoration: none;
    font-weight: 500;
  }

  .links a:hover { text-decoration: underline; }

  /* Entrance */
  @keyframes up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pretitle, h1, .jp { animation: up 0.5s ease-out both; }
  h1 { animation-delay: 0.05s; }
  .jp { animation-delay: 0.1s; }
  .egg { animation: up 0.5s ease-out 0.15s both, bob 2.5s ease-in-out 0.7s infinite; }
  .tagline { animation: up 0.5s ease-out 0.2s both; }
  .install { animation: up 0.5s ease-out 0.3s both; }
  .line { animation: up 0.5s ease-out 0.4s both; }

  @media (max-width: 480px) {
    .install { font-size: 12px; padding: 14px 16px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="pretitle">Welcome to</div>
  <h1>KODOMON</h1>
  <div class="jp">コードモン</div>

  <div class="egg">
    <div class="egg-grid">
      <div class="r"><div class="p c0"></div><div class="p c0"></div><div class="p c1"></div><div class="p c1"></div><div class="p c1"></div><div class="p c1"></div><div class="p c0"></div><div class="p c0"></div></div>
      <div class="r"><div class="p c0"></div><div class="p c1"></div><div class="p c2"></div><div class="p c2"></div><div class="p c2"></div><div class="p c2"></div><div class="p c1"></div><div class="p c0"></div></div>
      <div class="r"><div class="p c1"></div><div class="p c2"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c2"></div><div class="p c1"></div></div>
      <div class="r"><div class="p c1"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c1"></div></div>
      <div class="r"><div class="p c1"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c1"></div></div>
      <div class="r"><div class="p c1"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c1"></div></div>
      <div class="r"><div class="p c1"></div><div class="p c3"></div><div class="p c4"></div><div class="p c3"></div><div class="p c3"></div><div class="p c4"></div><div class="p c3"></div><div class="p c1"></div></div>
      <div class="r"><div class="p c0"></div><div class="p c1"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c3"></div><div class="p c1"></div><div class="p c0"></div></div>
      <div class="r"><div class="p c0"></div><div class="p c0"></div><div class="p c1"></div><div class="p c1"></div><div class="p c1"></div><div class="p c1"></div><div class="p c0"></div><div class="p c0"></div></div>
    </div>
  </div>

  <div class="tagline">A desktop pet that grows when you code.</div>

  <div class="install" onclick="copy()" role="button" tabindex="0">
    <span class="pr">$ </span>curl -fsSL <span class="url">https://kodomon.app/install.sh</span> | bash
  </div>
  <div class="hint" id="h">click to copy</div>

  <div class="line"></div>
  <div class="sub">macOS 14+ <span>|</span> 100% local <span>|</span> open source</div>
  <div class="links"><a href="https://github.com/brysonkbarney/kodomon">GitHub</a></div>
</div>

<script>
function copy() {
  navigator.clipboard.writeText('curl -fsSL https://kodomon.app/install.sh | bash').then(() => {
    const h = document.getElementById('h');
    h.textContent = 'copied!';
    h.classList.add('ok');
    setTimeout(() => { h.textContent = 'click to copy'; h.classList.remove('ok'); }, 2000);
  });
}
document.querySelector('.install').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); copy(); }
});
</script>
</body>
</html>
